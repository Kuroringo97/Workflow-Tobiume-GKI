name: Build kernel

# ── CONFIG — edit links here ────────────────────────────────────────
env:
  # Repos
  KERNEL_REPO:    https://github.com/Kurozuka97/kernel_common-5.10
  ANYKERNEL_REPO: https://github.com/Kurozuka97/AnyKernel3

  # Identity
  BUILD_USER: Kurozuka97
  BUILD_HOST: KuroKernel

  # Toolchain download links
  URL_NEUTRON_19:          https://raw.githubusercontent.com/Neutron-Toolchains/antman/main/antman
  URL_AOSP_12:             https://github.com/AOSP-12/prebuilts_clang_host_linux-x86_clang-r445002.git
  URL_YUKI_22:             https://usc1.contabostorage.com/ab57618a161b456a8d009c2e2de4a408:xperience/toolchains/yuki-clang-+bolt-20251211.tar.zst
  URL_YUKI_23:             https://usc1.contabostorage.com/ab57618a161b456a8d009c2e2de4a408:xperience/toolchains/yuki-clang-+bolt-20260124.tar.zst
  URL_LLVM_18_1_3:         https://mirrors.edge.kernel.org/pub/tools/llvm/files/llvm-18.1.3-x86_64.tar.gz
  URL_GOOGLE_CLANG_20:     https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/62cdcefa89e31af2d72c366e8b5ef8db84caea62/clang-r547379.tar.gz
  URL_GOOGLE_CLANG_21_0_0: https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/531a564ba5426707dee226eccb19f104a7af5a5f/clang-r563880c.tar.gz
# ────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:
      ksu_variant:
        description: 'KernelSU: KOWSU=KOWX712, KSUN=KSU-Next+SuSFS, VANILLA=none, ALL=all'
        type: choice
        options: [KOWSU, KSUN, VANILLA, ALL]
        default: KOWSU

      clang_variant:
        description: 'Clang toolchain'
        type: choice
        options: [NEUTRON_19, AOSP_12, YUKI_22, YUKI_23, LLVM_18_1_3, GOOGLE_CLANG_20, GOOGLE_CLANG_21_0_0, ALL]
        default: NEUTRON_19

      kernel_ref:
        description: 'Branch / tag / SHA'
        type: string
        default: android12-5.10

      defconfig:
        description: 'Defconfig'
        type: string
        default: gki_defconfig

      kernel_name:
        description: 'Output zip name (no .zip)'
        type: string
        default: KuroKernel

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      ksu_variants:   ${{ steps.resolve.outputs.ksu_variants }}
      clang_variants: ${{ steps.resolve.outputs.clang_variants }}
    steps:
      - name: Resolve variants
        id: resolve
        run: |
          if [ "${{ inputs.ksu_variant }}" = "ALL" ]; then
            echo 'ksu_variants=["KOWSU","KSUN","VANILLA"]' >> $GITHUB_OUTPUT
          else
            echo 'ksu_variants=["${{ inputs.ksu_variant }}"]' >> $GITHUB_OUTPUT
          fi
          if [ "${{ inputs.clang_variant }}" = "ALL" ]; then
            echo 'clang_variants=["NEUTRON_19","AOSP_12","YUKI_22","YUKI_23","LLVM_18_1_3","GOOGLE_CLANG_20","GOOGLE_CLANG_21_0_0"]' >> $GITHUB_OUTPUT
          else
            echo 'clang_variants=["${{ inputs.clang_variant }}"]' >> $GITHUB_OUTPUT
          fi

  build:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ksu:   ${{ fromJson(needs.setup.outputs.ksu_variants) }}
        clang: ${{ fromJson(needs.setup.outputs.clang_variants) }}

    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: true
          swap-storage: false

      - name: Setup swap
        run: |
          sudo swapoff -a || true
          sudo fallocate -l 20G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile && sudo swapon /swapfile

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            bc bison flex build-essential libssl-dev libelf-dev \
            cpio kmod rsync zip patch curl ca-certificates \
            python3 git wget zstd llvm lld clang tar xz-utils ccache

      - name: Cache toolchain
        uses: actions/cache@v4
        with:
          path: ~/toolchain
          key: toolchain-${{ matrix.clang }}-v1

      - name: Download toolchain
        run: |
          mkdir -p ~/toolchain
          case "${{ matrix.clang }}" in
            NEUTRON_19)
              mkdir -p ~/toolchain/neutron && cd ~/toolchain/neutron
              curl -LO "${{ env.URL_NEUTRON_19 }}"
              chmod +x antman && ./antman -S=10032024 && ./antman --patch=glibc
              ;;
            AOSP_12)
              git clone --depth=1 "${{ env.URL_AOSP_12 }}" ~/toolchain/aosp
              ;;
            YUKI_22)
              mkdir -p ~/toolchain/yuki22 && cd ~/toolchain/yuki22
              wget -O yuki.tar.zst "${{ env.URL_YUKI_22 }}"
              tar --use-compress-program=unzstd -xvf yuki.tar.zst
              ;;
            YUKI_23)
              mkdir -p ~/toolchain/yuki23 && cd ~/toolchain/yuki23
              wget -O yuki.tar.zst "${{ env.URL_YUKI_23 }}"
              tar --use-compress-program=unzstd -xvf yuki.tar.zst
              ;;
            LLVM_18_1_3)
              mkdir -p ~/toolchain/llvm18 && cd ~/toolchain/llvm18
              wget "${{ env.URL_LLVM_18_1_3 }}"
              tar -xvf llvm-18.1.3-x86_64.tar.gz --strip-components=1
              ;;
            GOOGLE_CLANG_20)
              mkdir -p ~/toolchain/google-clang20 && cd ~/toolchain/google-clang20
              wget -O clang.tar.gz "${{ env.URL_GOOGLE_CLANG_20 }}"
              tar -xvf clang.tar.gz
              ;;
            GOOGLE_CLANG_21_0_0)
              mkdir -p ~/toolchain/google-clang21 && cd ~/toolchain/google-clang21
              wget -O clang.tar.gz "${{ env.URL_GOOGLE_CLANG_21_0_0 }}"
              tar -xvf clang.tar.gz
              ;;

          esac

      - name: Export CLANG_PATH
        run: |
          case "${{ matrix.clang }}" in
            NEUTRON_19)          echo "CLANG_PATH=$HOME/toolchain/neutron" >> $GITHUB_ENV ;;
            AOSP_12)             echo "CLANG_PATH=$HOME/toolchain/aosp" >> $GITHUB_ENV ;;
            YUKI_22)             echo "CLANG_PATH=$HOME/toolchain/yuki22" >> $GITHUB_ENV ;;
            YUKI_23)             echo "CLANG_PATH=$HOME/toolchain/yuki23" >> $GITHUB_ENV ;;
            LLVM_18_1_3)         echo "CLANG_PATH=$HOME/toolchain/llvm18" >> $GITHUB_ENV ;;
            GOOGLE_CLANG_20)     echo "CLANG_PATH=$HOME/toolchain/google-clang20" >> $GITHUB_ENV ;;
            GOOGLE_CLANG_21_0_0) echo "CLANG_PATH=$HOME/toolchain/google-clang21" >> $GITHUB_ENV ;;
          esac
          echo "$CLANG_PATH/bin" >> $GITHUB_PATH

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          max-size: 2G
          key: ccache-${{ matrix.clang }}-${{ matrix.ksu }}-${{ inputs.kernel_ref }}

      - name: Clone kernel
        run: git clone --depth=1 --branch "${{ inputs.kernel_ref }}" ${{ env.KERNEL_REPO }} kernel

      - name: Apply KernelSU
        if: matrix.ksu != 'VANILLA'
        working-directory: kernel
        run: |
          if [ "${{ matrix.ksu }}" = "KOWSU" ]; then
            curl -LSs https://raw.githubusercontent.com/KOWX712/KernelSU/main/kernel/setup.sh | bash -s master
          else
            curl -LSs https://raw.githubusercontent.com/pershoot/KernelSU-Next/dev-susfs/kernel/setup.sh | bash -s dev-susfs
          fi

      - name: Apply SUSFS patches
        if: matrix.ksu == 'KSUN'
        working-directory: kernel
        run: |
          git clone https://gitlab.com/simonpunk/susfs4ksu/ -b gki-android12-5.10 sus
          cp -r sus/kernel_patches/fs sus/kernel_patches/include .
          patch -p1 < sus/kernel_patches/50_add_susfs_in_gki-android12-5.10.patch

      - name: Build kernel
        working-directory: kernel
        run: |
          export PATH="$CLANG_PATH/bin:$PATH"
          export CCACHE_EXEC=$(which ccache)
          export USE_CCACHE=1

          MAKE_ARGS="ARCH=arm64 O=out \
            CC='ccache clang' CXX='ccache clang++' \
            LD=ld.lld AR=llvm-ar NM=llvm-nm \
            STRIP=llvm-strip OBJCOPY=llvm-objcopy \
            OBJDUMP=llvm-objdump READELF=llvm-readelf \
            KBUILD_BUILD_USER=${{ env.BUILD_USER }} \
            KBUILD_BUILD_HOST=${{ env.BUILD_HOST }} \
            LLVM=1 LLVM_IAS=1"

          make $MAKE_ARGS ${{ inputs.defconfig }}
          make $MAKE_ARGS -j$(nproc --all)

      - name: Package & upload
        run: |
          git clone --depth=1 ${{ env.ANYKERNEL_REPO }} anykernel
          cp kernel/out/arch/arm64/boot/Image anykernel/
          cd anykernel && zip -r9 "../${{ inputs.kernel_name }}-${{ matrix.ksu }}-${{ matrix.clang }}.zip" .

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.kernel_name }}-${{ matrix.ksu }}-${{ matrix.clang }}
          path: "*.zip"
          retention-days: 30
